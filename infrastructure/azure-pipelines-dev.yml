name: $(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

variables:
  serviceConnectionName: "Talent Cloud Service Connection"
  npm_config_user_config: "$(System.DefaultWorkingDirectory)/.npmrc"
  dirResults: "$(System.DefaultWorkingDirectory)/apps/playwright/test-results"

  resourceGroupName: "rg_tbs_talent_2_PaaS"
  vertical: "dev"
  storageAccountName: "sttalclddevcacstdl"
  storageContainer: "playwright-results"

  baseUrl: "https://dev-talentcloud.tbs-sct.gc.ca"

pool:
  name: "TBS Linux Self Hosted"

jobs:
  - job: run_playwright_tests
    displayName: Run Playwright tests
    timeoutInMinutes: 30

    steps:
      - checkout: self
        clean: true
        fetchDepth: 1

      # ✅ FIX 1 — Force correct Node version
      - task: NodeTool@0
        displayName: "Use Node.js 24"
        inputs:
          versionSpec: "24.x"

      # ✅ FIX 2 — Install correct pnpm version
      - script: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm -v
          node -v
        displayName: "Install pnpm"

      # ✅ NPM registry setup (unchanged)
      - task: AzureCLI@2
        displayName: "Update NPMRC Config"
        inputs:
          scriptType: bash
          scriptLocation: inlineScript
          azureSubscription: $(serviceConnectionName)
          inlineScript: |
            NPMRC_FILE="$(npm_config_user_config)"
            echo "registry=https://pkgs.dev.azure.com/tbs-sct/53c8b022-82b7-4031-88aa-0d1266fc3bf5/_packaging/TalentCloud_Custom_NPM_Feed/npm/registry/" >> "$NPMRC_FILE"

      - task: npmAuthenticate@0
        displayName: "NPM Authenticate"
        inputs:
          workingFile: $(npm_config_user_config)

      # ✅ Ensure npm uses correct config
      - script: echo "##vso[task.setvariable variable=NPM_CONFIG_USERCONFIG]$(npm_config_user_config)"
        displayName: "Set Custom .npmrc Location"

      # ✅ FIX 3 — Stable dependency install
      - script: pnpm install --frozen-lockfile
        displayName: "Install dependencies"

      # ✅ Build (optional but safer if tests depend on it)
      - script: pnpm run build
        displayName: "Build application"

      # ✅ FIX 4 — Install correct Playwright browsers
      - script: npx playwright install --with-deps
        displayName: "Install Playwright browsers"

      # ✅ FIX 5 — Run tests with retries
      - script: npx playwright test --project=chromium --retries=2
        displayName: "Run Playwright tests"
        env:
          CI: "true"
          BASE_URL: $(baseUrl)
          TESTING_ENDPOINT_SECRET: $(TESTING_ENDPOINT_SECRET)
          PLAYWRIGHT_ADMIN_SUB: $(PLAYWRIGHT_ADMIN_SUB)
          PLAYWRIGHT_APPLICANT_SUB: $(PLAYWRIGHT_APPLICANT_SUB)

      # ✅ NEW — Publish Playwright report
      - task: PublishPipelineArtifact@1
        displayName: "Publish Playwright Report"
        condition: always()
        inputs:
          targetPath: "playwright-report"
          artifact: "playwright-report"

      # ✅ Upload results to Azure Storage
      - task: AzureCLI@2
        displayName: "Copy Playwright Results to Storage"
        condition: always()
        inputs:
          azureSubscription: $(serviceConnectionName)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -e

            if ! command -v az &> /dev/null; then
              echo "ERROR: az cli not found"
              exit 1
            fi

            DIR_SRC="$(dirResults)"
            echo "dirResults: $DIR_SRC"

            TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')

            if [ -d "$DIR_SRC" ]; then
              SA_RG="$(resourceGroupName)"
              SA_NAME="$(storageAccountName)"
              SA_CONTAINER_NAME="$(storageContainer)"
              SA_CONTAINER_PATH_PREFIX="$(vertical)/$TIMESTAMP"

              AZURE_STORAGE_KEY=$(az storage account keys list \
                --resource-group "$SA_RG" \
                --account-name "$SA_NAME" \
                --query "[0].value" \
                --output tsv)

              az storage blob upload-batch \
                --account-name "$SA_NAME" \
                --account-key "$AZURE_STORAGE_KEY" \
                --destination "$SA_CONTAINER_NAME/$SA_CONTAINER_PATH_PREFIX" \
                --source "$DIR_SRC"

              echo "Upload complete"
            else
              echo "No test-results directory found"
            fi
