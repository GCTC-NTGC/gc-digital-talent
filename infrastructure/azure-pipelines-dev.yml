name: $(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
  - name: vertical
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - uat

variables:
  serviceConnectionName: "Talent Cloud Service Connection"
  npm_config_user_config: "$(System.DefaultWorkingDirectory)/.npmrc"
  ${{ if eq(parameters.vertical, 'uat') }}:
    baseUrl: "https://uat-talentcloud.tbs-sct.gc.ca"
    playwrightArgs: "--project=uat-* --project=chromium --grep=@uat"
  ${{ else }}:
    baseUrl: "https://dev-talentcloud.tbs-sct.gc.ca"
    playwrightArgs: "--project=chromium"

pool:
  vmImage: ubuntu-24.04

jobs:
  - job: run_playwright_tests
    displayName: Run Playwright tests (${{ parameters.vertical }})
    timeoutInMinutes: 30

    steps:
      - checkout: self
        clean: true
        fetchDepth: 1

      - task: AzureCLI@2
        displayName: "Update NPMRC Config"
        inputs:
          scriptType: bash
          scriptLocation: inlineScript
          azureSubscription: $(serviceConnectionName)
          inlineScript: |
            NPMRC_FILE="$(npm_config_user_config)"
            echo "registry=https://pkgs.dev.azure.com/tbs-sct/53c8b022-82b7-4031-88aa-0d1266fc3bf5/_packaging/TalentCloud_Custom_NPM_Feed/npm/registry/" >> "$NPMRC_FILE"

      - task: npmAuthenticate@0
        displayName: "NPM Authenticate"
        inputs:
          workingFile: $(npm_config_user_config)

      - script: echo "##vso[task.setvariable variable=NPM_CONFIG_USERCONFIG]$(npm_config_user_config)"
        displayName: "Set Custom .npmrc Location"

      - task: NodeTool@0
        displayName: "Use Node.js 24"
        inputs:
          versionSpec: "24.x"

      - script: |
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
        displayName: "Install pnpm"

      - script: pnpm install --frozen-lockfile
        displayName: "Install dependencies"

      - script: pnpm run build
        displayName: "Build application"

      - script: npx playwright install --with-deps chromium
        displayName: "Install Playwright browsers"
        workingDirectory: $(System.DefaultWorkingDirectory)/apps/playwright

      - script: npx playwright test $(playwrightArgs) --retries=2
        displayName: "Run Playwright tests (${{ parameters.vertical }})"
        workingDirectory: $(System.DefaultWorkingDirectory)/apps/playwright
        env:
          CI: "true"
          BASE_URL: $(baseUrl)
          TESTING_ENDPOINT_SECRET: $(TESTING_ENDPOINT_SECRET)
          PLAYWRIGHT_PLATFORM_ADMIN_SUB: $(PLAYWRIGHT_PLATFORM_ADMIN_SUB)
          PLAYWRIGHT_COMMUNITY_ADMIN_SUB: $(PLAYWRIGHT_COMMUNITY_ADMIN_SUB)
          PLAYWRIGHT_APPLICANT_SUB: $(PLAYWRIGHT_APPLICANT_SUB)

      - task: PublishTestResults@2
        displayName: "Publish test results"
        condition: always()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: apps/playwright/test-results/results.xml
          testRunTitle: Playwright ${{ parameters.vertical }} - $(Build.BuildNumber)
          mergeTestResults: true

      - script: mkdir -p $(System.DefaultWorkingDirectory)/apps/playwright/playwright-report
        displayName: "Ensure report directory exists"
        condition: always()

      - task: PublishPipelineArtifact@1
        displayName: "Publish HTML report"
        condition: always()
        inputs:
          targetPath: $(System.DefaultWorkingDirectory)/apps/playwright/playwright-report
          artifact: playwright-${{ parameters.vertical }}-report
          publishLocation: pipeline
