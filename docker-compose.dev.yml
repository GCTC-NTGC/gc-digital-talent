# Development Docker Compose configuration with hot reloading
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Access the application at: http://localhost:8000

include:
  - docker-compose.yml

services:
  webserver:
    profiles:
      - disabled

  api:
    build:
      context: ./
      dockerfile: infrastructure/dev/api.Dockerfile
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html/api
      - ./.git:/var/www/html/.git:ro
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  web:
    build:
      context: ./
      dockerfile: infrastructure/dev/web.Dockerfile
    restart: unless-stopped
    volumes:
      - ./apps:/var/www/html/apps
      - ./packages:/var/www/html/packages
      - ./package.json:/var/www/html/package.json
      - ./pnpm-lock.yaml:/var/www/html/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/var/www/html/pnpm-workspace.yaml
      - ./.npmrc:/var/www/html/.npmrc
      - ./turbo.json:/var/www/html/turbo.json
      - ./.git:/var/www/html/.git:ro
      - ./node_modules:/var/www/html/node_modules
      # Share the API storage directory for GraphQL codegen to access the lighthouse schema
      - ./api/storage/app:/var/www/html/api/storage/app:ro
    env_file:
      - ./apps/web/.env
    environment:
      # Disable devServer redirect since nginx proxy handles routing
      DOCKER_DEV: "true"
    depends_on:
      - api

  # Nginx reverse proxy to route requests between api and web
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infrastructure/dev/default:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:8080"
    depends_on:
      - api
      - web
      - mock-auth
