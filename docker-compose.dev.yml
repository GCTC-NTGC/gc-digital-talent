# Development Docker Compose configuration with hot reloading
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Access the application at: http://localhost:8000

include:
  - docker-compose.yml

services:
  # Override adminer to use different port (8081) since nginx-proxy uses 8080 internally
  adminer:
    ports:
      - "8081:8080"

  # Remove webserver from dev (replaced by api + web + nginx-proxy)
  webserver:
    profiles:
      - disabled

  # Laravel API development server with hot reloading
  api:
    build:
      context: ./
      dockerfile: infrastructure/dev/Dockerfile.api
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html/api
      - ./.git:/var/www/html/.git:ro
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  # Vite/React development server with HMR
  web:
    build:
      context: ./
      dockerfile: infrastructure/dev/Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./apps:/var/www/html/apps
      - ./packages:/var/www/html/packages
      - ./package.json:/var/www/html/package.json
      - ./pnpm-lock.yaml:/var/www/html/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/var/www/html/pnpm-workspace.yaml
      - ./.npmrc:/var/www/html/.npmrc
      - ./turbo.json:/var/www/html/turbo.json
      - ./.git:/var/www/html/.git:ro
      - ./node_modules:/var/www/html/node_modules
    env_file:
      - ./apps/web/.env

  # Nginx reverse proxy to route requests between api and web
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infrastructure/dev/default:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:8080"
    depends_on:
      - api
      - web
      - mock-auth
