# Development Docker Compose configuration
#
# This configuration enables hot reloading for both Laravel and the React frontend.
# It uses separate containers for the API and web frontend, with an nginx reverse proxy.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Or with make:
#   make dev-up
#
# Access the application at: http://localhost:8000

services:
  # PostgreSQL database (same as production setup)
  postgres:
    image: postgres:16.10
    restart: always
    environment:
      POSTGRES_PASSWORD: password1234
    volumes:
      - ./infrastructure/db:/docker-entrypoint-initdb.d/
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer database UI (optional, useful for debugging)
  adminer:
    image: adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  # Mock OAuth2 server for local authentication
  mock-auth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.5
    volumes:
      - ./infrastructure/conf:/app/conf
      - ./infrastructure/mockauth/resources/login.html:/app/login/login.html
    restart: unless-stopped
    environment:
      JSON_CONFIG_PATH: /app/conf/mock-oauth2-server.json

  # Laravel API development server
  api:
    build:
      context: ./
      dockerfile: infrastructure/dev/Dockerfile.api
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html/api
      - ./.git:/var/www/html/.git:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DEV_APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=gctalent
      - DB_USERNAME=postgres
      - DB_PASSWORD=password1234
      - AUTH_SERVER_ROOT=http://mock-auth:8080/oxauth
      - OAUTH_URI=http://localhost:8000/oxauth/authorize
      - OAUTH_TOKEN_URI=http://mock-auth:8080/oxauth/token
      - OAUTH_API_CLIENT_ID=fake-development-client-key
      - OAUTH_API_CLIENT_SECRET=ignored-secret
      - OAUTH_REDIRECT_URI=http://localhost:8000/auth-callback
      - OAUTH_POST_LOGIN_REDIRECT=http://localhost:8000/applicant
      - OAUTH_POST_LOGIN_REGISTRATION_REDIRECT=http://localhost:8000/registration/account
      - DEV_OAUTH_POST_LOGIN_REDIRECT=http://localhost:8000/applicant
      - DEV_OAUTH_POST_LOGIN_REGISTRATION_REDIRECT=http://localhost:8000/registration/account
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=database
      - LIGHTHOUSE_SCHEMA_CACHE_ENABLE=false
      - LIGHTHOUSE_QUERY_CACHE_ENABLE=false
      # Pass through any env vars from host
      - GCNOTIFY_API_KEY
      - GCNOTIFY_TEMPLATE_VERIFY_EMAIL_EN
      - GCNOTIFY_TEMPLATE_NOMINATION_RECEIVED_SUBMITTER_EN
      - GCNOTIFY_TEMPLATE_NOMINATION_RECEIVED_SUBMITTER_FR
      - GCNOTIFY_TEMPLATE_NOMINATION_RECEIVED_NOMINATOR_EN
      - GCNOTIFY_TEMPLATE_NOMINATION_RECEIVED_NOMINATOR_FR
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Vite/React development server with HMR
  web:
    build:
      context: ./
      dockerfile: infrastructure/dev/Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./apps:/var/www/html/apps
      - ./packages:/var/www/html/packages
      - ./package.json:/var/www/html/package.json
      - ./pnpm-lock.yaml:/var/www/html/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/var/www/html/pnpm-workspace.yaml
      - ./.npmrc:/var/www/html/.npmrc
      - ./turbo.json:/var/www/html/turbo.json
      - ./.git:/var/www/html/.git:ro
      # Mount node_modules from container to avoid platform issues
      - web_node_modules:/var/www/html/node_modules
      - web_apps_node_modules:/var/www/html/apps/web/node_modules
    depends_on:
      - api
    environment:
      - NODE_ENV=development
      - API_HOST=http://localhost:8000
      - VITE_API_URI=/graphql
      - VITE_API_PROTECTED_URI=/admin/graphql
      - OAUTH_POST_LOGOUT_REDIRECT_EN=http://localhost:8000/en/logged-out
      - OAUTH_POST_LOGOUT_REDIRECT_FR=http://localhost:8000/fr/logged-out
      - OAUTH_LOGOUT_URI=http://localhost:8000/oxauth/endsession

  # Nginx reverse proxy to route requests
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infrastructure/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/conf/dev.robots.txt:/etc/nginx/dev.robots.txt:ro
    ports:
      - "8000:8080"
    depends_on:
      - api
      - web
      - mock-auth

  # Maintenance container for running setup scripts
  # Usage: docker compose -f docker-compose.dev.yml run --rm maintenance bash setup.sh
  maintenance:
    build: ./infrastructure/maintenance-container
    working_dir: /root/scripts
    deploy:
      mode: replicated
      replicas: 0
    volumes:
      - maintenancedata-dev:/root
      - ./.git:/var/www/html/.git
      - ./.gitignore:/var/www/html/.gitignore
      - ./.gitattributes:/var/www/html/.gitattributes
      - ./maintenance/scripts:/root/scripts
      - ./api:/var/www/html/api
      - ./apps:/var/www/html/apps
      - ./packages:/var/www/html/packages
      - ./tc-report:/var/www/html/tc-report
      - ./package.json:/var/www/html/package.json
      - ./pnpm-lock.yaml:/var/www/html/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/var/www/html/pnpm-workspace.yaml
      - ./.npmrc:/var/www/html/.npmrc
      - ./node_modules:/var/www/html/node_modules
      - ./turbo.json:/var/www/html/turbo.json
    depends_on:
      - postgres

volumes:
  pgdata-dev:
  maintenancedata-dev:
  web_node_modules:
  web_apps_node_modules:
